<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Helmet Detection AI{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <nav>
        <a href="{{ url_for('index') }}" class="brand">HelmetGuard AI</a>
        <div class="nav-links">
            <a href="{{ url_for('detect_image') }}">Image</a>
            <a href="{{ url_for('detect_video') }}">Video</a>
            <a href="{{ url_for('webcam') }}">Webcam</a>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
