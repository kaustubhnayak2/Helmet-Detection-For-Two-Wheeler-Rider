{% extends 'base.html' %}

{% block title %}Live Webcam | HelmetGuard UI{% endblock %}

{% block content %}
<div class="glass" style="padding: 2rem; max-width: 900px; margin: 0 auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h2>Live Webcam Inference</h2>
        <div style="display: flex; align-items: center; gap: 0.5rem;">
            <span style="display: inline-block; width: 12px; height: 12px; border-radius: 50%; background-color: var(--danger); box-shadow: 0 0 10px var(--danger); animation: pulse 1.5s infinite;"></span>
            <span style="font-weight: 500; color: var(--danger);">LIVE</span>
        </div>
    </div>
    
    <div class="video-container" style="text-align: center;">
        <p style="color: var(--text-muted); margin-bottom: 1rem;">Capturing live frames from the server camera and running YOLO object detection.</p>
        <img src="{{ url_for('video_feed', source='webcam') }}" class="video-feed" style="border: 2px solid rgba(59, 130, 246, 0.3);" alt="Webcam feed">
    </div>
</div>

<style>
@keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.2); opacity: 0.7; }
    100% { transform: scale(1); opacity: 1; }
}
</style>
{% endblock %}
